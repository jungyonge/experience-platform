spring:
  datasource:
    url: jdbc:h2:mem:experiencedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-for-local-development-only-32bytes}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

crawling:
  enabled: true
  mock-enabled: false
  schedule-cron: "0 0 * * * *"
  max-pages-per-site: 5
  delay-min-ms: 1000
  delay-max-ms: 2000
  connection-timeout-ms: 10000
  read-timeout-ms: 30000
  user-agent: "ExperiencePlatformBot/1.0 (+https://example.com/bot)"
  reve-api-token: ${REVE_API_TOKEN:}
  reve-username: ${REVE_USERNAME:qjsro1204@naver.com}
  reve-password: ${REVE_PASSWORD:Wjddyd!0619}
